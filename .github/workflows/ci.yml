name: CI

# Every job here consumes a reusable workflow from
# `sebastienrousseau/noyalib` pinned by SHA. A supply-chain
# hardening pass in noyalib propagates to this satellite via a
# Dependabot SHA-bump PR — enforced by the 48h propagation SLA
# monitor in the parent repo (scripts/shared-workflow-propagation-monitor.sh).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Caller-side permissions must be at least as broad as every
# reusable workflow's declared `permissions:` block.
# `shared-verify-signatures.yml` needs `pull-requests: read` to
# iterate PR commits via the REST API.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-deny.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  cargo-vet:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-vet.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  cargo-machete:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-machete.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  reuse-lint:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-reuse.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  docs-strict:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-rustdoc-strict.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  verify-signatures:
    uses: sebastienrousseau/noyalib/.github/workflows/shared-verify-signatures.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a

  test-matrix:
    # `noyalib-wasm` is a wasm-bindgen crate; the OS matrix is
    # narrowed to ubuntu-latest only — the JS binding surface is
    # exercised end-to-end by wasm-bindgen-test under a headless
    # browser rather than by native `cargo test` on macOS/Windows.
    uses: sebastienrousseau/noyalib/.github/workflows/shared-test-matrix.yml@346a9b0a79fe5d1397dd499e66fc5c234570779a
    with:
      os-list: '["ubuntu-latest"]'
      toolchain-list: '["stable", "nightly"]'
